<html>
    <!-- literally just a canvas with an emoji in it -->
    <head>
        <style>
            body {
                margin: 0;
                padding: 24px;
                background: #f6f6f6;
                font-family: system-ui, "Segoe UI", sans-serif;
            }

            .grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
                gap: 16px;
                align-items: start;
            }

            .card {
                background: #ffffff;
                border: 1px solid #e6e6e6;
                border-radius: 8px;
                padding: 12px;
                display: grid;
                gap: 8px;
                justify-items: center;
            }

            .label {
                font-size: 12px;
                color: #555;
            }

            canvas {
                border: 1px solid #ddd;
                background: transparent;
            }

            .download {
                font-size: 12px;
                color: #1a73e8;
                text-decoration: none;
            }
        </style>
    </head>

    <body>
        <div class="grid" id="canvasGrid"></div>

        <script>
            (function () {
                var grid = document.getElementById("canvasGrid");
                if (!grid) return;

                var size = 64;
                var fontSize = Math.round(size * 0.72);
                var emojiFont =
                    fontSize +
                    "px system-ui, 'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', sans-serif";

                var red = "#DC143C";
                var green = "#3bb54a";
                var white = "#ffffff";

                var moodBase = [
                    { name: "mood", emoji: "😌" },
                    { name: "focus", emoji: "🎯" },
                    { name: "confidence", emoji: "😎" },
                    { name: "energy", emoji: "⚡" },
                    { name: "hand", emoji: "✋" },
                ];

                var statusVariants = [
                    { suffix: "good", label: "good", color: green },
                    { suffix: "bad", label: "bad", color: red },
                ];

                var whiteSet = [
                    { name: "job", emoji: "💼" },
                    { name: "health", emoji: "⚕️" },
                    { name: "relationship", emoji: "👨‍❤️‍💋‍👩" },
                    { name: "friends", emoji: "🥳" },
                ];

                function createCard(config) {
                    var card = document.createElement("div");
                    card.className = "card";

                    var canvas = document.createElement("canvas");
                    canvas.width = size;
                    canvas.height = size;

                    var ctx = canvas.getContext("2d");
                    if (!ctx) return;

                    ctx.fillStyle = config.background;
                    ctx.fillRect(0, 0, size, size);
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    ctx.font = emojiFont;
                    ctx.fillText(config.emoji, size / 2, size / 2 + 1);

                    var label = document.createElement("div");
                    label.className = "label";
                    label.textContent = config.label;

                    var download = document.createElement("a");
                    download.className = "download";
                    download.textContent = "Download";
                    download.href = canvas.toDataURL("image/png");
                    download.download = config.filename + ".png";

                    card.appendChild(canvas);
                    card.appendChild(label);
                    card.appendChild(download);
                    grid.appendChild(card);
                }

                moodBase.forEach(function (item) {
                    statusVariants.forEach(function (variant) {
                        createCard({
                            emoji: item.emoji,
                            background: variant.color,
                            label: item.name + " / " + variant.label,
                            filename: item.name + "-" + variant.suffix,
                        });
                    });
                });

                whiteSet.forEach(function (item) {
                    createCard({
                        emoji: item.emoji,
                        background: white,
                        label: item.name,
                        filename: item.name,
                    });
                });
            })();
        </script>
    </body>
</html>
